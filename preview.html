<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Preview</title>
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { margin: 20px; }
        h1 { color: var(--gold); font-size: 20px; margin-top: 0; }
        #video { display: block; max-width: 100%; width: 1280px; background: #000; min-height: 720px; border: 1px solid var(--border); border-radius: 3px; }
        .status { color: var(--text-dim); font-size: 13px; margin-top: 8px; }
        .row { margin: 14px 0; }
        button, select, input[type=range] { padding: 6px 14px; margin-right: 8px; }
        button { background: var(--bg-elev); color: var(--text); border: 1px solid var(--border); border-radius: 3px; cursor: pointer; }
        button:hover { background: #2b2b34; color: var(--gold); border-color: var(--gold); }
        select { background: #000; color: var(--text); border: 1px solid var(--border); padding: 4px 8px; }
        label { color: var(--text-dim); margin-right: 6px; }
        code { color: var(--gold); }
    </style>
</head>
<body>
    <h1>Camera Preview</h1>
    <img id="video" alt="preview stream">
    <div class="status" id="status">waiting for stream...</div>

    <div class="row">
        <label>Resolution:</label>
        <select id="resolutionSelect">
            <option value="640x480">640 × 480</option>
            <option value="1280x720" selected>1280 × 720</option>
            <option value="1920x1080">1920 × 1080</option>
        </select>
        <label style="margin-left:16px;">Quality:</label>
        <input type="range" id="qualityRange" min="30" max="95" value="85" style="vertical-align:middle;">
        <span id="qualityValue">85</span>
        <button id="applyStreamButton" style="margin-left:12px;">Apply</button>
    </div>

    <div class="row" style="border:1px solid var(--border); padding:10px; background: var(--bg-panel);">
        <div style="color:var(--gold); font-weight:600; margin-bottom:8px;">Live Controls <span style="color:var(--text-dim); font-weight:normal; font-size:12px;">(applied instantly to the running preview)</span></div>
        <div style="display:grid; grid-template-columns: auto 1fr auto; gap: 6px 12px; align-items:center;">
            <label>Auto Exposure:</label>
            <input type="checkbox" id="aeToggle" checked>
            <span></span>

            <label>Exposure (µs):</label>
            <input type="range" id="exposureRange" min="100" max="66000" step="100" value="10000">
            <span id="exposureValue">10000</span>

            <label>Gain:</label>
            <input type="range" id="gainRange" min="1.0" max="16.0" step="0.1" value="1.0">
            <span id="gainValue">1.0</span>

            <label>AWB:</label>
            <select id="awbSelect">
                <option value="0">Auto</option>
                <option value="1">Tungsten</option>
                <option value="2">Fluorescent</option>
                <option value="3">Indoor</option>
                <option value="4">Daylight</option>
                <option value="5">Cloudy</option>
            </select>
            <span></span>

            <label>Brightness:</label>
            <input type="range" id="brightnessRange" min="-1.0" max="1.0" step="0.05" value="0">
            <span id="brightnessValue">0</span>

            <label>Contrast:</label>
            <input type="range" id="contrastRange" min="0.0" max="2.0" step="0.05" value="1.0">
            <span id="contrastValue">1.0</span>

            <label>Saturation:</label>
            <input type="range" id="saturationRange" min="0.0" max="2.0" step="0.05" value="1.0">
            <span id="saturationValue">1.0</span>

            <label for="focusRange">Focus:</label>
            <input type="range" id="focusRange" min="0.0" max="10.0" step="0.1">
            <span id="focusValue"></span>
        </div>
    </div>

    <div class="row">
        <button id="startStreamButton">Restart Stream</button>
        <button id="stopStreamButton">Stop Stream</button>
        <button id="takePhotoButton">Take Photo</button>
    </div>

    <hr style="border-color: var(--border); margin: 28px 0 16px;">
    <h2 style="color: var(--gold); font-size: 16px;">Camera Settings <span id="configCameraLabel" style="color: var(--text-dim); font-weight: normal; font-size: 13px;"></span></h2>
    <div class="row">
        <label style="display:block; margin-bottom:4px;">Photo args (appended to libcamera-still):</label>
        <input type="text" id="photoArgs" placeholder="e.g. --awb daylight --ev 0.3" style="width: 90%; padding: 6px 8px; background: #000; color: var(--text); border: 1px solid var(--border);">
    </div>
    <div class="row">
        <label style="display:block; margin-bottom:4px;">Video args (appended to libcamera-vid):</label>
        <input type="text" id="videoArgs" placeholder="e.g. --denoise cdn_off --shutter 8000" style="width: 90%; padding: 6px 8px; background: #000; color: var(--text); border: 1px solid var(--border);">
    </div>
    <div class="row">
        <button id="saveConfigButton" style="background: var(--gold); color: #000; font-weight: 600;">Save Settings</button>
        <span id="saveConfigStatus" style="color: var(--text-dim); margin-left: 10px;"></span>
    </div>

    <script src="/js/socket.io-1.4.5.js"></script>
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var socketId = urlParams.get('socketId');
        var socket = io('http://' + location.hostname + ':3000');

        var videoElement = document.getElementById('video');
        var statusElement = document.getElementById('status');
        var focusRange = document.getElementById('focusRange');

        function setStatus(text) { statusElement.textContent = text; }

        var resolutionSelect = document.getElementById('resolutionSelect');
        var qualityRange     = document.getElementById('qualityRange');
        var qualityValue     = document.getElementById('qualityValue');
        qualityRange.addEventListener('input', function () { qualityValue.textContent = qualityRange.value; });

        function currentPreviewOpts() {
            var parts = resolutionSelect.value.split('x');
            return {
                width:   parseInt(parts[0], 10),
                height:  parseInt(parts[1], 10),
                quality: parseInt(qualityRange.value, 10)
            };
        }

        function startPreview() {
            setStatus('requesting stream...');
            var opts = currentPreviewOpts();
            socket.emit('preview', Object.assign({ socketId: socketId, clientId: socketId }, opts));
        }

        function stopPreview() {
            socket.emit('stop-preview', { socketId: socketId });
            videoElement.removeAttribute('src');
            setStatus('stopped');
        }

        // Auto-start as soon as the socket is ready
        socket.on('connect', function () {
            console.log('preview socket connected, id=', socket.id, 'cameraSocketId=', socketId);
            if (socketId) startPreview();
            else setStatus('missing socketId query param');
        });

        var currentPiBase = null;   // e.g. http://192.168.81.23:8888
        socket.on('preview-url', function (url) {
            console.log('Preview URL:', url);
            // Cache-bust so browser doesn't reuse a dead connection.
            videoElement.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 't=' + Date.now();
            setStatus('streaming from ' + url);
            // Store base for /controls POST
            try {
                var u = new URL(url);
                currentPiBase = u.origin;
                flushControls(true); // push any slider state accumulated before url arrived
            } catch (e) {}
        });

        // --- Live control sliders --------------------------------------
        var aeToggle        = document.getElementById('aeToggle');
        var exposureRange   = document.getElementById('exposureRange');
        var exposureValueEl = document.getElementById('exposureValue');
        var gainRange       = document.getElementById('gainRange');
        var gainValueEl     = document.getElementById('gainValue');
        var awbSelect       = document.getElementById('awbSelect');
        var brightnessRange = document.getElementById('brightnessRange');
        var brightnessValueEl = document.getElementById('brightnessValue');
        var contrastRange   = document.getElementById('contrastRange');
        var contrastValueEl = document.getElementById('contrastValue');
        var saturationRange = document.getElementById('saturationRange');
        var saturationValueEl = document.getElementById('saturationValue');
        var focusValueEl    = document.getElementById('focusValue');

        function bindSlider(input, labelEl, fmt) {
            input.addEventListener('input', function () {
                if (labelEl) labelEl.textContent = fmt ? fmt(input.value) : input.value;
                scheduleControls();
            });
        }
        bindSlider(exposureRange, exposureValueEl);
        bindSlider(gainRange, gainValueEl, function (v) { return Number(v).toFixed(1); });
        bindSlider(brightnessRange, brightnessValueEl, function (v) { return Number(v).toFixed(2); });
        bindSlider(contrastRange, contrastValueEl, function (v) { return Number(v).toFixed(2); });
        bindSlider(saturationRange, saturationValueEl, function (v) { return Number(v).toFixed(2); });
        awbSelect.addEventListener('change', scheduleControls);
        aeToggle.addEventListener('change', scheduleControls);
        focusRange.addEventListener('input', function () {
            if (focusValueEl) focusValueEl.textContent = Number(focusRange.value).toFixed(1);
            scheduleControls();
        });

        var controlsDebounce = null;
        function scheduleControls() {
            clearTimeout(controlsDebounce);
            controlsDebounce = setTimeout(function () { flushControls(false); }, 150);
        }

        function currentControls() {
            return {
                ae: aeToggle.checked ? 'auto' : 'manual',
                exposure:   exposureRange.value,
                gain:       gainRange.value,
                awb:        awbSelect.value,
                brightness: brightnessRange.value,
                contrast:   contrastRange.value,
                saturation: saturationRange.value,
                focus:      focusRange.value
            };
        }

        function flushControls(silent) {
            if (!currentPiBase) return;
            var payload = currentControls();
            fetch(currentPiBase + '/controls', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).then(function (r) {
                if (!silent && r.ok) setStatus('controls applied: ' + JSON.stringify(payload));
            }).catch(function (e) {
                console.warn('controls POST failed:', e);
            });
            // Also keep server-side update-focus event working for legacy paths
            socket.emit('update-focus', { socketId: socketId, focusValue: focusRange.value });
        }

        videoElement.addEventListener('error', function () {
            setStatus('stream connection failed — retrying in 2s');
            setTimeout(function () {
                if (videoElement.src) {
                    var base = videoElement.src.split('?')[0];
                    videoElement.src = base + '?t=' + Date.now();
                }
            }, 2000);
        });

        document.getElementById('startStreamButton').addEventListener('click', startPreview);
        document.getElementById('stopStreamButton').addEventListener('click', stopPreview);
        document.getElementById('applyStreamButton').addEventListener('click', function () {
            socket.emit('stop-preview', { socketId: socketId });
            setTimeout(startPreview, 600);
        });
        document.getElementById('takePhotoButton').addEventListener('click', function () {
            socket.emit('take-photo', { time: Date.now() });
        });

        window.addEventListener('beforeunload', stopPreview);

        // --- Per-camera settings ---------------------------------------
        var photoArgsEl      = document.getElementById('photoArgs');
        var videoArgsEl      = document.getElementById('videoArgs');
        var saveConfigStatus = document.getElementById('saveConfigStatus');
        var configCameraLbl  = document.getElementById('configCameraLabel');

        function requestConfig() {
            socket.emit('get-camera-config', { socketId: socketId });
        }

        socket.on('connect', requestConfig);

        socket.on('camera-config', function (msg) {
            if (!msg) return;
            var cfg = msg.config || {};
            configCameraLbl.textContent = msg.hostName ? '(' + msg.hostName + ')' : '';
            photoArgsEl.value = cfg.photoArgs || '';
            videoArgsEl.value = cfg.videoArgs || '';
            if (cfg.previewSize) {
                var opt = resolutionSelect.querySelector('option[value="' + cfg.previewSize + '"]');
                if (opt) resolutionSelect.value = cfg.previewSize;
            }
            if (cfg.previewQuality) {
                qualityRange.value = cfg.previewQuality;
                qualityValue.textContent = cfg.previewQuality;
            }
            if (msg.saved) {
                saveConfigStatus.textContent = 'saved ' + new Date().toLocaleTimeString();
            }
        });

        document.getElementById('saveConfigButton').addEventListener('click', function () {
            saveConfigStatus.textContent = 'saving...';
            socket.emit('set-camera-config', {
                socketId: socketId,
                config: {
                    photoArgs:      photoArgsEl.value.trim(),
                    videoArgs:      videoArgsEl.value.trim(),
                    previewSize:    resolutionSelect.value,
                    previewQuality: parseInt(qualityRange.value, 10)
                }
            });
        });
    </script>
</body>
</html>
